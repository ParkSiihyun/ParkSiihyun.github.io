<!-- Apply theme ASAP to avoid flash of wrong color scheme -->
<script>
(function() {
  try {
    var saved = localStorage.getItem('sh-theme');
    var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  } catch (e) {}
})();
</script>

<!-- MathJax for rendering $$...$$ and \(...\) in posts -->
<script>
  window.MathJax = {
    tex: {
      // Only use \( \) for inline math — leave single $ alone so dollar prices ($150) render normally
      inlineMath: [['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      processEnvironments: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
      ignoreHtmlClass: 'sh-formula|sh-glossary|no-mathjax'
    },
    chtml: {
      scale: 1.0,
      minScale: 0.5,
      matchFontHeight: false
    }
  };
</script>
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

<!-- end custom head snippets -->
